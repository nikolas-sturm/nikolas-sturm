<svg fill="none" viewBox="0 0 480 72" width="480" height="72" xmlns="http://www.w3.org/2000/svg">
	<title>Email Nikolas Sturm</title>
	<foreignObject width="480" height="72">
		<div xmlns="http://www.w3.org/1999/xhtml" class="panel">
			<style>
				@keyframes scan-boot {
					0% { opacity: 0; transform: translateY(-668px); }
					12% { opacity: 0.9; }
					85% { opacity: 0.65; }
					100% { opacity: 0; transform: translateY(102px); }
				}

				@keyframes grid-boot {
					from { opacity: 0; transform: scale(1.04); }
					to { opacity: 0.8; transform: none; }
				}

				@keyframes reveal {
					from { opacity: 0; filter: blur(8px); transform: translateY(12px); }
					to { opacity: 1; filter: none; transform: none; }
				}

				* { box-sizing: border-box; }

				.panel {
					--paper: #f3f0e8;
					--ink: #111827;
					--muted: #4f5968;
					--accent: #3157ff;
					--signal: #ff4d6d;
					--line: rgba(17, 24, 39, 0.14);
					position: relative;
					display: flex;
					width: 480px;
					height: 72px;
					align-items: center;
					overflow: hidden;
					box-shadow: inset 1px 0 var(--line), inset 0 -1px var(--line);
					border-radius: 0 0 0 24px;
					background: var(--paper);
					color: var(--ink);
					font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
				}

				.panel::before {
					position: absolute;
					inset: 0;
					background-image:
						linear-gradient(var(--line) 1px, transparent 1px),
						linear-gradient(90deg, var(--line) 1px, transparent 1px);
					background-position: 0 -17px;
					background-size: 48px 48px;
					content: "";
					clip-path: inset(0 0 0 1px);
					mask-image: linear-gradient(90deg, black, rgba(0, 0, 0, 0.34));
					animation: grid-boot 900ms cubic-bezier(0.16, 1, 0.3, 1) both;
				}

				.panel::after {
					position: absolute;
					top: 0;
					right: 0;
					left: 0;
					z-index: 3;
					height: 22px;
					background: linear-gradient(180deg, transparent, color-mix(in srgb, var(--signal) 42%, transparent), transparent);
					box-shadow: 0 7px 28px color-mix(in srgb, var(--signal) 16%, transparent);
					content: "";
					pointer-events: none;
					animation: scan-boot 2.65s cubic-bezier(0.3, 0, 0.3, 1) both;
				}

				.content {
					position: relative;
					top: -12px;
					z-index: 1;
					display: flex;
					width: 100%;
					align-items: center;
					justify-content: space-between;
					padding: 0 28px 0 36px;
					animation: reveal 520ms 1960ms cubic-bezier(0.16, 1, 0.3, 1) both;
				}

				.action { display: flex; align-items: center; gap: 12px; }

				.icon {
					display: grid;
					width: 34px;
					height: 34px;
					place-items: center;
					border: 1px solid var(--line);
					border-radius: 10px;
					background: color-mix(in srgb, var(--paper) 82%, var(--ink));
					color: var(--accent);
				}

				.icon svg { width: 15px; height: 15px; fill: currentColor; }
				.copy { display: flex; flex-direction: column; gap: 3px; }

				.eyebrow {
					color: var(--muted);
					font-size: 8px;
					font-weight: 800;
					letter-spacing: 0.16em;
					text-transform: uppercase;
				}

				strong { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }

				.destination {
					display: flex;
					align-items: center;
					gap: 12px;
					color: var(--muted);
					font-size: 10px;
					font-weight: 700;
					letter-spacing: 0.08em;
				}

				.arrow { color: var(--accent); font-size: 18px; line-height: 1; }

				@media (prefers-color-scheme: dark) {
					.panel {
						--paper: #07111f;
						--ink: #f6f7f2;
						--muted: #9ca9ba;
						--accent: #b6ff4a;
						--signal: #68e1ff;
						--line: rgba(225, 235, 245, 0.13);
					}
				}

				@media (prefers-reduced-motion: reduce) {
					.panel::before { opacity: 0.8; animation: none; }
					.panel::after { display: none; }
					.content { animation: none; }
				}
			</style>

			<div class="content">
				<div class="action">
					<span class="icon">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M48 64C21.5 64 0 85.5 0 112c0 15.1 7.1 29.3 19.2 38.4L236.8 313.6c11.4 8.5 27 8.5 38.4 0L492.8 150.4c12.1-9.1 19.2-23.3 19.2-38.4c0-26.5-21.5-48-48-48H48zM0 176v208c0 35.3 28.7 64 64 64h384c35.3 0 64-28.7 64-64V176L294.4 339.2c-22.8 17.1-54 17.1-76.8 0L0 176z" /></svg>
					</span>
					<span class="copy"><span class="eyebrow">Connect / 01</span><strong>Email</strong></span>
				</div>
				<span class="destination">code@nsturm.me <span class="arrow">↗</span></span>
			</div>
		</div>
	</foreignObject>
</svg>
